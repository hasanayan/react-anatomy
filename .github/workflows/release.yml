# Publishes @react-anatomy/core and @react-anatomy/storybook to npm when a
# v* tag is pushed (tags are created by `pnpm release`, see scripts/release.mjs).
# Needs the NPM_TOKEN repository secret; id-token gives npm provenance.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm build

      - name: Check tag matches package versions
        run: node scripts/check-release-tag.ts "$GITHUB_REF_NAME"

      - run: pnpm -r publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
