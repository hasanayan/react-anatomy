# Publishes @react-anatomy/core and @react-anatomy/storybook to npm when a
# v* tag on a commit contained in main is pushed (tags come from `pnpm release`).
# Needs the NPM_TOKEN repository secret; id-token gives npm provenance.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag is on main
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "tag $GITHUB_REF_NAME ($GITHUB_SHA) is not on main; refusing to release"
            exit 1
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm build

      - name: Check tag matches package versions
        run: node scripts/check-release-tag.ts "$GITHUB_REF_NAME"

      - run: pnpm -r stage publish --access public --no-git-checks
        env:
          NPM_CONFIG_PROVENANCE: "true"
