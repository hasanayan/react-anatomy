<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" width="1000" height="640" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <style>
      .ann      { fill: #71717a; font-size: 11px; letter-spacing: .04em; }
      .ann-b    { fill: #a1a1aa; font-size: 11px; letter-spacing: .04em; }
      .ptr      { stroke: #52525b; stroke-width: 1; stroke-dasharray: 2 3; fill: none; }
      .brace    { stroke: #52525b; stroke-width: 1; fill: none; }
      .lbl-text { fill: #fff; font-size: 13px; font-weight: 600; }
    </style>
  </defs>

  <rect width="1000" height="640" fill="#0a0a0a"/>

  <!-- ══ gutter ══ -->
  <rect x="90" y="60" width="190" height="500" fill="#ffffff" fill-opacity="0.028"/>
  <line x1="90" y1="60" x2="90" y2="560" stroke="#3f3f46" stroke-width="1" stroke-dasharray="3 4"/>
  <text class="ann-b" x="98" y="76">gutter</text>
  <text class="ann" x="98" y="92">one side's labels live here</text>

  <!-- ══ fan x-interval bracket (top) ══ -->
  <path class="brace" d="M240 46 L240 34 L280 34 L280 46"/>
  <line x1="260" y1="34" x2="260" y2="26" stroke="#52525b" stroke-width="1"/>
  <text class="ann" x="292" y="31">every fan on this side spans exactly this x-interval</text>
  <text class="ann" x="292" y="45" fill="#52525b">→ same domain → order preserved → no crossings</text>
  <text class="ann" x="222" y="59" fill="#52525b">X₁</text>
  <text class="ann" x="284" y="59" fill="#52525b">X₀</text>

  <!-- ══ frame ══ -->
  <rect x="280" y="60" width="480" height="500" rx="10" fill="none" stroke="#3f3f46" stroke-width="1.5"/>
  <path class="ptr" d="M760 100 L800 100"/>
  <text class="ann-b" x="806" y="97">frame</text>
  <text class="ann" x="806" y="112">component bounds</text>

  <!-- ══ rail ══ -->
  <line x1="280" y1="60" x2="280" y2="560" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.85"/>
  <path class="ptr" d="M280 588 L280 604 L214 604"/>
  <text class="ann-b" x="150" y="601" text-anchor="start">rail</text>
  <text class="ann" x="150" y="617">stub ends · fan begins</text>

  <!-- ══ zone A (parent) ══ -->
  <rect x="320" y="140" width="400" height="340" rx="4" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4 4"/>
  <path class="ptr" d="M720 160 L800 160"/>
  <text class="ann-b" x="806" y="157">zone</text>
  <text class="ann" x="806" y="172">a rect in the component</text>

  <!-- ══ zone B (child) ══ -->
  <rect x="360" y="200" width="200" height="120" rx="4" fill="none" stroke="#2dd4bf" stroke-width="1.5" stroke-dasharray="4 4"/>
  <path class="ptr" d="M560 300 L800 300"/>
  <text class="ann-b" x="806" y="297">nested zone</text>
  <text class="ann" x="806" y="312">its own edges, its own anchor</text>

  <!-- ══ segment (zone A, left edge) ══ -->
  <line x1="320" y1="330" x2="320" y2="470" stroke="#a78bfa" stroke-width="5" stroke-linecap="round"/>
  <line x1="313" y1="330" x2="327" y2="330" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  <line x1="313" y1="470" x2="327" y2="470" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  <path class="ptr" d="M334 348 L392 348"/>
  <text class="ann-b" x="398" y="345">segment</text>
  <text class="ann" x="398" y="360">exclusive extent, inset, ≥ minRun</text>
  <text class="ann" x="398" y="374" fill="#52525b">the anchor may slide anywhere in here</text>

  <!-- ══ leader: zone A ══ -->
  <path d="M320 420 L280 420" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4 3"/>
  <path d="M280 420 L240 470" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="320" cy="420" r="4.5" fill="#0a0a0a" stroke="#a78bfa" stroke-width="2"/>
  <circle cx="320" cy="420" r="1.5" fill="#a78bfa"/>

  <path class="ptr" d="M330 424 L356 440"/>
  <text class="ann-b" x="362" y="444">anchor</text>
  <text class="ann" x="362" y="458">a point, on an edge</text>

  <path class="ptr" d="M300 414 L300 396"/>
  <text class="ann-b" x="292" y="390" text-anchor="middle">stub</text>
  <text class="ann" x="292" y="376" text-anchor="middle" fill="#52525b">⊥ to rail</text>

  <path class="ptr" d="M258 448 L232 424"/>
  <text class="ann-b" x="226" y="420" text-anchor="end">fan</text>
  <text class="ann" x="226" y="406" text-anchor="end" fill="#52525b">rail → label</text>

  <!-- leader bracket -->
  <path class="brace" d="M240 522 L240 534 L320 534 L320 522"/>
  <line x1="280" y1="534" x2="280" y2="542" stroke="#52525b" stroke-width="1"/>
  <text class="ann-b" x="280" y="558" text-anchor="middle">leader</text>
  <text class="ann" x="280" y="572" text-anchor="middle" fill="#52525b">anchor → stub → fan → label</text>

  <!-- ══ leader: zone B ══ -->
  <path d="M360 260 L280 260" stroke="#2dd4bf" stroke-width="1.5" stroke-dasharray="4 3"/>
  <path d="M280 260 L240 240" stroke="#2dd4bf" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="360" cy="260" r="4.5" fill="#0a0a0a" stroke="#2dd4bf" stroke-width="2"/>
  <circle cx="360" cy="260" r="1.5" fill="#2dd4bf"/>
  <line x1="360" y1="212" x2="360" y2="308" stroke="#2dd4bf" stroke-width="5" stroke-linecap="round" opacity="0.35"/>

  <!-- ancestor crossing marker -->
  <circle cx="320" cy="260" r="7" fill="none" stroke="#52525b" stroke-width="1" stroke-dasharray="2 2"/>
  <path class="ptr" d="M320 250 L320 196 L398 196"/>
  <text class="ann-b" x="404" y="193">ancestor crossing</text>
  <text class="ann" x="404" y="208">unavoidable, so it's free</text>

  <!-- ══ labels ══ -->
  <rect x="150" y="225" width="90" height="30" rx="6" fill="#2dd4bf"/>
  <text class="lbl-text" x="195" y="245" text-anchor="middle" fill="#042f2e">zone B</text>

  <rect x="150" y="455" width="90" height="30" rx="6" fill="#a78bfa"/>
  <text class="lbl-text" x="195" y="475" text-anchor="middle" fill="#2e1065">zone A</text>

  <path class="ptr" d="M150 240 L118 240 L118 300"/>
  <text class="ann-b" x="112" y="270" text-anchor="end">label</text>

  <!-- order note -->
  <path class="brace" d="M132 225 L124 225 L124 485 L132 485"/>
  <text class="ann" x="118" y="360" text-anchor="end" fill="#52525b">order</text>
  <text class="ann" x="118" y="374" text-anchor="end" fill="#52525b">= anchor order</text>
</svg>
